name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  flake-check:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            allow-unfree = true

      - name: Build the bootstrap package
        run: nix build .#default

      - name: Sanity-check the CLI
        run: ./result/bin/bootstrap --help

      - name: Flake check (mypy --strict + pytest + ruff + nixfmt)
        run: nix flake check

  test-register:
    # End-to-end test for the register phase. Stands up a throwaway
    # dotfiles fixture (age key + sops-encrypted secret files + minimal
    # registry/tags/.sops.yaml + local bare-repo origin) and runs
    # `bootstrap register --non-interactive` against it via
    # BOOTSTRAP_* env overrides. Exercises: clone_or_pull, decision
    # tree, _select_tags, _ensure_age_key, registry_toml/sops_yaml
    # edits, sops updatekeys, sops verify_decrypt, git_ops.commit +
    # push (with GIT_{AUTHOR,COMMITTER}_* from env), _ensure_symlink.
    #
    # Catches regressions in register.py / git_ops.py / sops_ops.py /
    # secrets.py / the gh identity lookup — the kind that used to only
    # show up on mac2 when the user actually ran the bootstrap.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            allow-unfree = true

      - name: Build the bootstrap package
        run: nix build .#default

      - name: Run register end-to-end test
        run: nix shell nixpkgs#git nixpkgs#age nixpkgs#sops -c bash scripts/ci-test-register.sh

  test-e2e-nixos:
    # Full end-to-end bootstrap-register test inside a fresh NixOS VM
    # via pkgs.testers.nixosTest. Two scenarios: devbox + sandbox.
    #
    # Exercises the production headless path end-to-end — SOPS_AGE_KEY_FILE
    # pre-staged, bundled test sops file decrypted, mock `gh` answering
    # API calls, register phase committing + pushing to a local bare
    # remote. Sandbox scenario additionally asserts the new anchor is
    # NOT wired into secrets.yaml's creation_rule.
    #
    # Needs KVM, which ubuntu-latest runners ship with — the nixos-test
    # derivation declares `requiredSystemFeatures = ["nixos-test" "kvm"]`.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [devbox, sandbox]
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            allow-unfree = true
            system-features = nixos-test benchmark big-parallel kvm

      - name: Run nixos-e2e-${{ matrix.variant }}
        run: nix build .#checks.x86_64-linux.nixos-e2e-${{ matrix.variant }} --print-build-logs
