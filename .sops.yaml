# SOPS recipient config for the bootstrap repo. All sops-encrypted files
# in this repo are encrypted to the bootstrap age key (public half below,
# private half in 1Password). The Python bootstrap extracts the private
# half at runtime and uses it to decrypt these files as part of the
# secrets_zero phase.
keys:
  - &bootstrap 

creation_rules:
  # Everything under the top-level `secrets/` directory is encrypted to
  # the bootstrap age key. Both the Python-bundled sops files
  # (bootstrap-secrets*.sops.yaml) and the Nix-consumed ones
  # (phase0.yaml) live here.
  - path_regex: 'secrets/.*\.ya?ml$'
    key_groups:
      - age:
          - *bootstrap
